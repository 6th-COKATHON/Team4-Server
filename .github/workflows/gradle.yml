name: Java CI with Gradle

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GCP_PRIVATE_KEY: ${{ secrets.GCP_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ✅ Inject team4_gcs.json with secret key
        run: |
          mkdir -p src/main/resources
          echo "$GCP_PRIVATE_KEY" > src/main/resources/team4_gcs.json

      - name: 🔨 Build with Gradle (skip tests)
        run: ./gradlew bootJar -x test

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar


  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: ⬇️ Download JAR from build
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./jar-output

      - name: 📤 Send JAR to EC2
        run: |
          scp -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_rsa \
            ./jar-output/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/stagemate/app.jar

      - name: 🚀 Restart App on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/stagemate
            sudo systemctl restart stagemate


  dependency-submission:
    name: Submit Dependency Graph
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GCP_PRIVATE_KEY: ${{ secrets.GCP_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ✅ Inject team4_gcs.json
        run: |
          mkdir -p src/main/resources
          echo "$GCP_PRIVATE_KEY" > src/main/resources/team4_gcs.json

      - name: 📦 Submit dependency graph
        uses: gradle/actions/dependency-submission@v4
